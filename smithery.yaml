name: "@edition/japan-operations"
displayName: "EDITION Intelligence Platform"
description: "Japan Operations OS for autonomous AI agents. 14 knowledge domains, 31 MCP tools. Verified knowledge covering regulations, procedures, protocols, calendar, regional, organization, foreign entry, travel, entertainment, daily life, language, food culture, disaster & safety, and persistent memory."
version: "0.4.0"
author: "EDITION"
homepage: "https://edition.sh"
repository: "https://github.com/hiroshic9-png/edition-api"
license: "MIT"
tags:
  - japan
  - business
  - regulations
  - compliance
  - protocols
  - travel
  - entertainment
  - memory
  - knowledge-base
  - agent-os
  - food-culture
  - language
  - disaster-safety
  - daily-life
startCommand:
  type: http
  url: "https://api.edition.sh/mcp"
  configSchema:
    type: object
    properties:
      EDITION_API_URL:
        type: string
        default: "https://api.edition.sh"
        description: "EDITION API base URL"
      EDITION_API_KEY:
        type: string
        default: "edition_dev_key_for_testing"
        description: "API key for authentication (free beta key provided)"
