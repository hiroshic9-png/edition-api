name: "@edition/japan-operations"
displayName: "EDITION Intelligence Platform"
description: "Japan Operations OS for autonomous AI agents. 14 knowledge domains, 31 MCP tools, 2 prompt templates. Verified, structured ground truth covering business regulations (10 industries), step-by-step procedures (65 steps), business protocols (nemawashi, ringi, hourensou, meishi, seating, gift-giving), fiscal calendar & deadlines, regional differences, organizational structures (keiretsu, payment customs), foreign market entry (visa, banking, incorporation), travel intelligence (shinkansen, IC cards, ryokan), entertainment & pop culture (oshi-katsu, anime, festivals), daily life (postal, garbage, utilities, healthcare), Japanese language (keigo, counters, business Japanese), food culture (dining etiquette, cuisine, dietary restrictions), disaster & safety (earthquakes, typhoons, emergency contacts), and persistent multi-layer memory."
version: "0.5.0"
author: "EDITION"
homepage: "https://edition.sh"
repository: "https://github.com/hiroshic9-png/edition-api"
license: "MIT"
tags:
  - japan
  - business
  - regulations
  - compliance
  - protocols
  - travel
  - entertainment
  - memory
  - knowledge-base
  - agent-os
  - food-culture
  - language
  - disaster-safety
  - daily-life
  - keigo
  - visa
  - tokyo
  - culture
security:
  scanPassed: true
  lastScanned: "2026-05-10"
startCommand:
  type: http
  url: "https://api.edition.sh/mcp"
  configSchema:
    type: object
    properties:
      EDITION_API_URL:
        type: string
        default: "https://api.edition.sh"
        description: "EDITION API base URL"
      EDITION_API_KEY:
        type: string
        default: "edition_dev_key_for_testing"
        description: "API key for authentication (free beta key provided)"
