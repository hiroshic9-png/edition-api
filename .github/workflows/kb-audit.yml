name: Knowledge Base Monthly Audit

on:
  schedule:
    # 毎月1日 09:00 JST (00:00 UTC)
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      domain:
        description: 'Specific domain to audit (leave empty for full platform audit)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run KB structural audit
        id: audit
        env:
          AUDIT_DOMAIN: ${{ github.event.inputs.domain || '' }}
        run: |
          PYTHONPATH=. python scripts/audit_runner.py \
            --output data/audit_results.json \
            ${AUDIT_DOMAIN:+--domain "$AUDIT_DOMAIN"}

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: kb-audit-report-${{ github.run_number }}
          path: data/audit_results.json
          retention-days: 90

      - name: Create issue on failures
        if: steps.audit.outputs.has_errors == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('data/audit_results.json', 'utf8'));
            const summary = report.summary;
            
            let body = `## KB Audit Report — ${summary.audit_date}\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Domains Audited | ${summary.domains_audited} |\n`;
            body += `| Total Entries | ${summary.total_entries} |\n`;
            body += `| Errors | **${summary.total_errors}** |\n`;
            body += `| Warnings | ${summary.total_warnings} |\n`;
            body += `| Health Score | ${summary.health_score}/100 |\n\n`;
            
            if (report.errors && report.errors.length > 0) {
              body += `### Errors\n\n`;
              for (const err of report.errors.slice(0, 20)) {
                body += `- **${err.domain}/${err.entry_id}**: ${err.description}\n`;
              }
            }
            
            body += `\n\n_Auto-generated by KB Monthly Audit workflow_`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[KB Audit] ${summary.total_errors} error(s) found — ${summary.audit_date}`,
              body: body,
              labels: ['kb-audit', 'automated']
            });

      - name: Commit audit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/audit_results.json || true
          git diff --cached --quiet || git commit -m "chore(audit): monthly KB audit $(date +%Y-%m-%d)"
          git push || true
