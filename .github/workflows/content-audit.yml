name: EDITION Content Audit

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/audit_pipeline.py'
  pull_request:
    paths:
      - 'data/**'
  schedule:
    # Monthly audit on the 1st at 09:00 JST (00:00 UTC)
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Content Quality Audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Audit Pipeline
        run: python scripts/audit_pipeline.py --json

      - name: Check for Critical Issues
        run: |
          python -c "
          import json, sys
          with open('data/audit_results.json') as f:
              r = json.load(f)
          crit = r['summary']['critical']
          warn = r['summary']['warning']
          info = r['summary']['info']
          print(f'🔴 {crit} Critical | 🟡 {warn} Warning | 🔵 {info} Info')
          if crit > 0:
              print('❌ Critical issues found — failing build')
              sys.exit(1)
          print('✅ No critical issues')
          "

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: data/audit_results.json
